site_name: Open Referral Docs
site_url: https://docs.openreferral.io/
site_description: Guides, concepts and integration references for Open Referral.
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  favicon: assets/images/favicon.png
  icon:
    logo: fontawesome-regular/narwhal
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: fontawesome-regular/brightness
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: fontawesome-regular/moon
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - assets/fontawesome/css/regular.min.css

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Knowledge:
      - Overview: knowledge/index.md
  - ATS integrations:
      - Overview: ats-integrations/index.md
  - AI assistant integrations:
      - Claude: ai-assistant-integrations/claude.md
      - Gemini CLI: ai-assistant-integrations/gemini-cli.md
      - ChatGPT: ai-assistant-integrations/chatgpt.md
      - Le Chat (Mistral): ai-assistant-integrations/le-chat.md
      - Others (any MCP client): ai-assistant-integrations/others.md
